<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Sistema de Chaves</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #1a2a4a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { max-width: 380px; width: 100%; border: none; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
        .logo { font-size: 2.5rem; color: #1a2a4a; }
    </style>
</head>
<body>
<div class="card p-4">
    <div class="text-center mb-4">
        <i class="bi bi-key-fill logo"></i>
        <h4 class="mt-2 fw-bold">Sistema de Chaves</h4>
        <p class="text-muted small">Controle de acesso</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label small fw-semibold">Login</label>
            <input type="text" name="login" class="form-control" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label small fw-semibold">Senha</label>
            <input type="password" name="senha" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
        </button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
