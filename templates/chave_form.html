{% extends 'base.html' %}
{% block title %}Nova Chave{% endblock %}
{% block content %}
<h4 class="fw-bold mb-4">Nova chave</h4>
<div class="row"><div class="col-md-5">
<div class="card p-4">
<form method="POST">
    <div class="mb-3">
        <label class="form-label fw-semibold">Andar</label>
        <input type="text" name="andar" class="form-control" placeholder="Ex: 1" required>
    </div>
    <div class="mb-3">
        <label class="form-label fw-semibold">Número</label>
        <input type="text" name="numero" class="form-control" placeholder="Ex: 101" required>
    </div>
    <div class="mb-4">
        <label class="form-label fw-semibold">Descrição <span class="text-muted fw-normal">(opcional)</span></label>
        <input type="text" name="descricao" class="form-control" placeholder="Ex: Sala de reuniões">
    </div>
    <button type="submit" class="btn btn-primary w-100">Cadastrar chave</button>
</form>
</div></div></div>
{% endblock %}
